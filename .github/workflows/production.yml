name: Kitsu Production Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: kitsu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: kitsu.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: kitsu-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: kitsu-m1

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libssh2-1-dev libssl-dev pkg-config

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install libssh2 openssl pkg-config

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build Release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Rename binary (Unix)
      if: runner.os != 'Windows'
      run: |
        mv target/${{ matrix.target }}/release/kitsu target/${{ matrix.target }}/release/${{ matrix.binary_name }}

    - name: Archive Artifacts (Unix)
      if: runner.os != 'Windows'
      run: |
        cd target/${{ matrix.target }}/release
        tar -czf ../../../kitsu-${{ matrix.target }}.tar.gz ${{ matrix.binary_name }}

    - name: Archive Artifacts (Windows)
      if: runner.os == 'Windows'
      run: |
        cd target/${{ matrix.target }}/release
        7z a ../../../kitsu-${{ matrix.target }}.zip ${{ matrix.binary_name }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kitsu-${{ matrix.target }}
        path: kitsu-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: kitsu-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/kitsu-*
        generate_release_notes: true
        draft: false
        prerelease: false
